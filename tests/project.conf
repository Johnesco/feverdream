#!/bin/bash
# Fever Dream — project-specific test configuration
# Parsed by the testing framework (tools/testing/*.py)
#
# PROJECT_DIR is set by the framework before sourcing this file.

# Project identity
PROJECT_NAME="Fever Dream"

# Resolve ifhub root (PROJECT_DIR is projects/feverdream, ifhub is two levels up)
_IFHUB_ROOT="$(cd "$PROJECT_DIR/../.." && pwd)"

# Platform detection: prefer native Windows interpreters if available
_NATIVE_GLULXE="$_IFHUB_ROOT/tools/interpreters/glulxe.exe"

if [[ ("$OSTYPE" == "msys" || "$OSTYPE" == "cygwin") && -x "$_NATIVE_GLULXE" ]]; then
    # Native Windows — no WSL needed
    PRIMARY_ENGINE_NAME="glulxe"
    PRIMARY_ENGINE_PATH="$_NATIVE_GLULXE"
    PRIMARY_ENGINE_SEED_FLAG="--rngseed"
    PRIMARY_GAME_PATH="$PROJECT_DIR/feverdream.ulx"
    PRIMARY_WALKTHROUGH="$PROJECT_DIR/tests/inform7/walkthrough.txt"
    PRIMARY_OUTPUT_FILE="$PROJECT_DIR/tests/inform7/walkthrough_output.txt"
    PRIMARY_SEEDS_KEY="glulxe"
else
    # WSL/Linux paths (original defaults)
    PRIMARY_ENGINE_NAME="glulxe"
    PRIMARY_ENGINE_PATH="$HOME/glulxe/glulxe"
    PRIMARY_ENGINE_SEED_FLAG="--rngseed"
    PRIMARY_GAME_PATH="$PROJECT_DIR/feverdream.ulx"
    PRIMARY_WALKTHROUGH="$PROJECT_DIR/tests/inform7/walkthrough.txt"
    PRIMARY_OUTPUT_FILE="$PROJECT_DIR/tests/inform7/walkthrough_output.txt"
    PRIMARY_SEEDS_KEY="glulxe"
fi

# No alternate engine for Fever Dream

# Score extraction patterns
# Fever Dream has no scoring system ("There is no score in this story").
# Set a dummy regex that won't match — pass/fail is determined by WON_PATTERNS.
SCORE_REGEX='NOSCORE'
SCORE_FALLBACK_REGEX='NOSCORE'
MAX_SCORE_REGEX='NOSCORE'
PASS_THRESHOLD=0
DEFAULT_MAX_SCORE=0

# Diagnostic patterns
DEATH_PATTERNS='water fills the chamber'
WON_PATTERNS='You reach in|It reaches back'

# Override pass/fail: use endgame detection instead of score
# (The generic framework checks FINAL_SCORE >= PASS_THRESHOLD.
#  For scoreless games, we rely on the wrapper to check WON_PATTERNS.)
SCORELESS_GAME=true

# Pipeline config (used by tools/pipeline.py, ignored by testing framework)
PIPELINE_SOUND=true
PIPELINE_VERSIONED=false
PIPELINE_CURRENT_VERSION=""
PIPELINE_HUB_ID="feverdream"
PIPELINE_TESTS="walkthrough"
